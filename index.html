<button id="secretBtn">•</button>

<div id="adminPanel" style="display:none;">
    <h3>مدیریت محصولات</h3>

    <input type="file" id="imageInput"><br><br>
    <input type="text" id="nameInput" placeholder="نام محصول"><br><br>
    <input type="text" id="priceInput" placeholder="قیمت"><br><br>

    <button onclick="addProduct()">ثبت محصول</button>
</div>

<div id="products"></div>

<script>
document.getElementById("secretBtn").onclick = function(){

    let pass = prompt("رمز را وارد کنید");

    if(pass === "132465"){
        document.getElementById("adminPanel").style.display="block";
    }else{
        alert("رمز اشتباه است");
    }
}

function addProduct(){

    let name = document.getElementById("nameInput").value;
    let price = document.getElementById("priceInput").value;

    let file = document.getElementById("imageInput").files[0];

    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(e){

        document.getElementById("products").innerHTML += `
        <div class="card">
            <img src="${e.target.result}" width="250">
            <h3>${name}</h3>
            <p>${price} تومان</p>

            <a href="tel:091937503356">
                <button>تماس برای سفارش</button>
            </a>

            <a href="sms:091937503356?body=سفارش ${name}">
                <button>پیامک سفارش</button>
            </a>
        </div>
        `;
    };

    reader.readAsDataURL(file);
}
</script>
