<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هوران گالری | کیف و مهر دست‌ساز</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#f5f5f5;
    color:#222;
}

header{
    background:#102542;
    color:#d4af37;
    text-align:center;
    padding:40px 20px;
}

header p{
    color:white;
}

section{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h2{
    color:#102542;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    margin:0;
}

.card p{
    padding:0 10px;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#102542;
    color:white;
    text-decoration:none;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

footer{
    background:#102542;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

/* دکمه مخفی */
#secretBtn{
    position:fixed;
    bottom:4px;
    right:4px;
    width:10px;
    height:10px;
    border:none;
    background:#102542;
    color:#102542;
    cursor:pointer;
}

/* پنل مدیریت */
#adminPanel{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    z-index:999;
    width:300px;
}

#adminPanel input{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

.closeBtn{
    background:red;
    color:white;
}
</style>
</head>

<body>

<header>
    <h1>هوران گالری</h1>
    <p>فروشگاه اینترنتی کیف و مهر دست‌ساز</p>
</header>

<section>
    <h2>درباره ما</h2>
    <p>
        تولید و فروش کیف‌های دست‌ساز و مهرهای سفارشی با طراحی اختصاصی.
    </p>
</section>

<section>
    <h2>محصولات</h2>
    <div class="products" id="products"></div>
</section>

<footer>
    تماس: 09193753356
</footer>

<!-- دکمه مخفی -->
<button id="secretBtn">.</button>

<!-- پنل مدیریت -->
<div id="adminPanel">
    <h3>مدیریت محصولات</h3>

    <input type="file" id="imageInput">

    <input type="text" id="nameInput" placeholder="نام محصول">

    <input type="text" id="priceInput" placeholder="قیمت">

    <button class="btn" onclick="addProduct()">
        ثبت محصول
    </button>

    <button class="btn closeBtn"
        onclick="document.getElementById('adminPanel').style.display='none'">
        بستن
    </button>
</div>

<script>

const PASSWORD = "132465";

/* ورود مدیریت */
document.getElementById("secretBtn").onclick = function(){

    let pass = prompt("رمز را وارد کنید");

    if(pass === PASSWORD){
        document.getElementById("adminPanel").style.display = "block";
    }else{
        alert("رمز اشتباه است");
    }
};

/* بارگذاری محصولات */
loadProducts();

function addProduct(){

    const name = document.getElementById("nameInput").value;
    const price = document.getElementById("priceInput").value;
    const file = document.getElementById("imageInput").files[0];

    if(!name || !price || !file){
        alert("همه فیلدها را تکمیل کنید");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        let products =
            JSON.parse(localStorage.getItem("products")) || [];

        products.push({
            name:name,
            price:price,
            image:e.target.result
        });

        localStorage.setItem(
            "products",
            JSON.stringify(products)
        );

        loadProducts();

        document.getElementById("nameInput").value="";
        document.getElementById("priceInput").value="";
        document.getElementById("imageInput").value="";
    };

    reader.readAsDataURL(file);
}

function loadProducts(){

    let products =
        JSON.parse(localStorage.getItem("products")) || [];

    let html = "";

    products.forEach((product,index)=>{

        html += `
        <div class="card">

            <img src="${product.image}">

            <h3>${product.name}</h3>

            <p>${product.price} تومان</p>

            <a class="btn"
               href="tel:09193753356">
               تماس برای سفارش
            </a>

            <a class="btn"
               href="sms:09193753356?body=سلام، برای سفارش ${product.name} پیام می‌دهم.">
               پیامک سفارش
            </a>

        </div>
        `;
    });

    document.getElementById("products").innerHTML = html;
}
</script>

</body>
</html>
